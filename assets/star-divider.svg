<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 50" width="1200" height="50" preserveAspectRatio="none">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#BC8CFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="50" fill="url(#starGrad)"/>
  <g>
    <text x="200" y="25" text-anchor="middle" font-size="14" fill="#58A6FF" opacity="0.3">
      &#9733;
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="font-size" values="14;18;14" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="350" y="25" text-anchor="middle" font-size="10" fill="#BC8CFF" opacity="0.2">
      &#9733;
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="font-size" values="10;14;10" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </text>
    <text x="500" y="25" text-anchor="middle" font-size="16" fill="#39D2C0" opacity="0.3">
      &#9733;
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="font-size" values="16;20;16" dur="4s" repeatCount="indefinite" begin="1s"/>
    </text>
    <text x="650" y="25" text-anchor="middle" font-size="12" fill="#58A6FF" opacity="0.2">
      &#9733;
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="font-size" values="12;16;12" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
    </text>
    <text x="800" y="25" text-anchor="middle" font-size="8" fill="#BC8CFF" opacity="0.3">
      &#9733;
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="font-size" values="8;12;8" dur="2s" repeatCount="indefinite" begin="2s"/>
    </text>
    <text x="950" y="25" text-anchor="middle" font-size="14" fill="#39D2C0" opacity="0.2">
      &#9733;
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.5s" repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="font-size" values="14;18;14" dur="4.5s" repeatCount="indefinite" begin="2.5s"/>
    </text>
  </g>
  <!-- Connecting lines -->
  <g opacity="0.08">
    <line x1="200" y1="30" x2="350" y2="30" stroke="#58A6FF" stroke-width="0.5"/>
    <line x1="500" y1="30" x2="650" y2="30" stroke="#BC8CFF" stroke-width="0.5"/>
    <line x1="800" y1="30" x2="950" y2="30" stroke="#39D2C0" stroke-width="0.5"/>
  </g>
</svg>