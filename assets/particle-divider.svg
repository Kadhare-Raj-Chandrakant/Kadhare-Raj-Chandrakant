<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60" preserveAspectRatio="none">
  <defs>
    <linearGradient id="particleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="60" fill="url(#particleGrad)"/>
  <g>
    <circle cx="50" cy="30" r="1.5" fill="#58A6FF">
      <animate attributeName="cy" values="30;10;30" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="30" r="1" fill="#BC8CFF">
      <animate attributeName="cy" values="30;50;30" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="30" r="2" fill="#39D2C0">
      <animate attributeName="cx" values="280;300;280" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="30" r="1.5" fill="#58A6FF">
      <animate attributeName="cx" values="420;400;420" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="30" r="1" fill="#BC8CFF">
      <animate attributeName="cy" values="30;15;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="30" r="2" fill="#39D2C0">
      <animate attributeName="cy" values="30;45;30" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="30" r="1.5" fill="#58A6FF">
      <animate attributeName="cx" values="750;770;750" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="30" r="1" fill="#BC8CFF">
      <animate attributeName="cy" values="30;10;30" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="30" r="2" fill="#39D2C0">
      <animate attributeName="cx" values="1000;980;1000" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="30" r="1.5" fill="#58A6FF">
      <animate attributeName="cy" values="30;50;30" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>