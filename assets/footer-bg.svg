<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200" preserveAspectRatio="none">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="30%" stop-color="#161B22"/>
      <stop offset="60%" stop-color="#1A2333"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="200" fill="url(#footerGrad)"/>
  
  <!-- Mountain/skyline silhouette -->
  <g fill="#161B22" opacity="0.4">
    <polygon points="0,200 0,160 60,140 120,155 180,120 240,145 300,110 360,135 420,100 480,130 540,115 600,140 660,105 720,125 780,95 840,120 900,110 960,135 1020,100 1080,130 1140,115 1200,140 1200,200"/>
  </g>
  <g fill="#1A2333" opacity="0.3">
    <polygon points="0,200 0,170 80,155 160,165 240,140 320,155 400,130 480,150 560,135 640,155 720,130 800,148 880,125 960,145 1040,130 1120,150 1200,140 1200,200"/>
  </g>
  
  <!-- Stars -->
  <g fill="white" opacity="0.3">
    <circle cx="100" cy="30" r="1">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="20" r="0.8">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="400" cy="40" r="1.2">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="550" cy="15" r="0.6">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="700" cy="35" r="1">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.8s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="850" cy="25" r="0.7">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.2s" repeatCount="indefinite" begin="2.5s"/>
    </circle>
    <circle cx="1000" cy="45" r="1.1">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4.2s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <circle cx="1100" cy="20" r="0.9">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.7s" repeatCount="indefinite" begin="3.5s"/>
    </circle>
  </g>
  
  <!-- Aurora effect -->
  <g opacity="0.05">
    <ellipse cx="300" cy="100" rx="200" ry="40" fill="#58A6FF">
      <animate attributeName="ry" values="30;50;30" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.03;0.08;0.03" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="800" cy="90" rx="250" ry="35" fill="#BC8CFF">
      <animate attributeName="ry" values="25;45;25" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.03;0.07;0.03" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="600" cy="110" rx="180" ry="30" fill="#39D2C0">
      <animate attributeName="ry" values="20;40;20" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.02;0.06;0.02" dur="7s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Circuit lines across bottom -->
  <g opacity="0.06" stroke="#58A6FF" stroke-width="0.5" fill="none">
    <path d="M0,180 L100,180 L100,170 L150,170 L150,180 L200,180"/>
    <path d="M400,180 L450,180 L450,190 L520,190 L520,180 L580,180"/>
    <path d="M800,180 L850,180 L850,170 L920,170 L920,180 L980,180 L980,175 L1050,175 L1050,180 L1200,180"/>
  </g>
</svg>