    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0.3;0.4;0.5;0.55;0.6" dur="20s" repeatCount="indefinite"/>
  </text>
  <text x="300" y="38" text-anchor="middle" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="20" font-weight="400" fill="#58A6FF" letter-spacing="1" opacity="0">
