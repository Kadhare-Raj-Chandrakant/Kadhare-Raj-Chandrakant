<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#BC8CFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#39D2C0" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#BC8CFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#39D2C0" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.4"/>
      <stop offset="25%" stop-color="#BC8CFF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#39D2C0" stop-opacity="0.4"/>
      <stop offset="75%" stop-color="#BC8CFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#BC8CFF"/>
      <stop offset="100%" stop-color="#39D2C0"/>
    </linearGradient>
    <linearGradient id="taglineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B949E"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glassmorphism">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="pulseGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulseGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BC8CFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#BC8CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulseGrad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39D2C0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#39D2C0" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="heroClip">
      <rect x="20" y="20" width="1160" height="560" rx="24"/>
    </clipPath>
  </defs>

  <rect width="1200" height="600" fill="#0D1117"/>

  <rect x="20" y="20" width="1160" height="560" rx="24" fill="url(#glow1)"/>
  <rect x="20" y="20" width="1160" height="560" rx="24" fill="url(#glow2)"/>

  <rect x="20" y="20" width="1160" height="560" rx="24" fill="none" stroke="url(#borderGrad)" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Glass overlay -->
  <rect x="20" y="20" width="1160" height="560" rx="24" fill="#0D1117" fill-opacity="0.6"/>

  <!-- Animated gradient orbs -->
  <circle cx="200" cy="200" r="180" fill="url(#pulseGrad1)">
    <animate attributeName="r" values="150;200;150" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="150" r="160" fill="url(#pulseGrad2)">
    <animate attributeName="r" values="120;180;120" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="450" r="140" fill="url(#pulseGrad3)">
    <animate attributeName="r" values="100;160;100" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Particles -->
  <g>
    <circle cx="100" cy="100" r="2" fill="#58A6FF">
      <animate attributeName="cy" values="100;500;100" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="80" r="1.5" fill="#BC8CFF">
      <animate attributeName="cy" values="80;480;80" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="50" r="1" fill="#39D2C0">
      <animate attributeName="cy" values="50;520;50" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="120" r="2" fill="#58A6FF">
      <animate attributeName="cy" values="120;550;120" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="60" r="1.5" fill="#BC8CFF">
      <animate attributeName="cy" values="60;460;60" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="90" r="1" fill="#39D2C0">
      <animate attributeName="cy" values="90;490;90" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="300" r="1.5" fill="#58A6FF">
      <animate attributeName="cx" values="150;1050;150" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="200" r="1" fill="#BC8CFF">
      <animate attributeName="cx" values="850;100;850" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="18s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Grid lines -->
  <g opacity="0.03">
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#58A6FF" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#58A6FF" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#58A6FF" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#58A6FF" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#58A6FF" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="600" stroke="#58A6FF" stroke-width="0.5"/>
  </g>

  <!-- Content Group -->
  <g transform="translate(600, 280)">

    <!-- Developer illustration / code brackets -->
    <g transform="translate(-160, -20)" opacity="0.08">
      <text font-family="monospace" font-size="180" fill="#58A6FF" text-anchor="middle" dominant-baseline="central">&lt;/&gt;</text>
    </g>

    <!-- Small decorative code brackets -->
    <g transform="translate(-280, -120)" opacity="0.15">
      <text font-family="monospace" font-size="28" fill="#58A6FF" font-weight="300">{ }</text>
    </g>
    <g transform="translate(220, -120)" opacity="0.15">
      <text font-family="monospace" font-size="28" fill="#39D2C0" font-weight="300">[ ]</text>
    </g>
    <g transform="translate(-270, 80)" opacity="0.12">
      <text font-family="monospace" font-size="20" fill="#BC8CFF" font-weight="300">( )</text>
    </g>
    <g transform="translate(230, 80)" opacity="0.12">
      <text font-family="monospace" font-size="22" fill="#58A6FF" font-weight="300">&lt;/&gt;</text>
    </g>

    <!-- Animated glowing line under name -->
    <line x1="-180" y1="25" x2="180" y2="25" stroke="url(#borderGrad)" stroke-width="1" opacity="0.5">
      <animate attributeName="x1" values="-180;-200;-180" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="180;200;180" dur="4s" repeatCount="indefinite"/>
    </line>

    <!-- Name -->
    <text text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="url(#nameGrad)" letter-spacing="2">
      Kadhare Raj Chandrakant
    </text>

    <!-- Tagline -->
    <g transform="translate(0, 60)">
      <text text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="300" fill="#8B949E" letter-spacing="4">
        Building software.
      </text>
      <text text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="300" fill="#8B949E" letter-spacing="3" y="35">
        Creating beautiful experiences.
      </text>
      <text text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="300" fill="#58A6FF" letter-spacing="3" y="70">
        Always learning. Never stopping.
      </text>
    </g>

    <!-- Decorative lines -->
    <g opacity="0.3">
      <line x1="-260" y1="-55" x2="-220" y2="-55" stroke="#58A6FF" stroke-width="1">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="220" y1="-55" x2="260" y2="-55" stroke="#39D2C0" stroke-width="1">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite" begin="1.5s"/>
      </line>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect x="420" y="510" width="360" height="2" rx="1" fill="url(#borderGrad)" opacity="0.4">
    <animate attributeName="width" values="360;300;360" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- GitHub corner decoration -->
  <g transform="translate(1090, 40)" opacity="0.3">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="none" stroke="#58A6FF" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="24" text-anchor="middle" font-family="monospace" font-size="16" fill="#58A6FF">&lt;/&gt;</text>
  </g>
</svg>